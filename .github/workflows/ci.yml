name: CI

on:
  push:
    branches:
      - main
      - "release/**"
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - assets/**
  pull_request:
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - assets/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust integration tests
        run: bash scripts/test_rust.sh

  frontend-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Check version sync
        run: node scripts/sync_version.mjs --check

      - name: Check release target resolver
        run: npm run release-targets:check

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

  tauri-build-smoke:
    name: tauri-build-smoke-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/heads/release/') || github.event_name == 'workflow_dispatch'
    needs:
      - rust-backend
      - frontend-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-${{ matrix.target }}
          path: src-tauri/target/release/bundle/**/*
