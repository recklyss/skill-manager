name: CI

on:
  push:
    branches:
      - main
      - release
    paths-ignore:
      - README.md
      - README.zh-CN.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - assets/**
  pull_request:
    branches:
      - main
      - release
    paths-ignore:
      - README.md
      - README.zh-CN.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - assets/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust integration tests
        run: bash scripts/test_rust.sh

  frontend-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check version sync
        run: node scripts/sync_version.mjs --check

      - name: Check npm LICENSE sync
        run: node scripts/sync_public_metadata.mjs --check

      - name: Check release target resolver
        run: npm run release-targets:check

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

  tauri-build-smoke:
    name: tauri-build-smoke-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs:
      - rust-backend
      - frontend-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Linux system dependencies
        run: bash scripts/install_linux_tauri_deps.sh

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: node scripts/sync_version.mjs --check

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Package npm/Homebrew tarball
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          bash scripts/package_release_artifact.sh "${{ matrix.target }}" "$VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-build-${{ matrix.target }}
          path: |
            .artifacts/release/**
            src-tauri/target/release/bundle/**/*
